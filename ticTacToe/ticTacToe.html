<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF=8" />
    <meta name="veiwport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="a game of TidTacToe" />
    <meta name="author" content="Haylee Smith" />
    <meta name="keywords" content="HTML, CSS, JavaScript, tictactoe, game" />
    <title>Tic-Tac-Toe 3x3</title>
    <link rel="stylesheet" href="styleTacToe.css" />
</head>
<body>
    <div id=game>
        <h1>TIC-TAC-TOE</h1>
        <div id="cellContainer">
            <div cellIndex="0" class="cell"></div>
            <div cellIndex="1" class="cell"></div>
            <div cellIndex="2" class="cell"></div>
            <div cellIndex="3" class="cell"></div>
            <div cellIndex="4" class="cell"></div>
            <div cellIndex="5" class="cell"></div>
            <div cellIndex="6" class="cell"></div>
            <div cellIndex="7" class="cell"></div>
            <div cellIndex="8" class="cell"></div>
        </div>
        <h2 id="statTxt"></h2>
        <button id="restart">Restart</button>
    </div>
    <script src="scriptTacToe.js"></script>
</body>
</html>
