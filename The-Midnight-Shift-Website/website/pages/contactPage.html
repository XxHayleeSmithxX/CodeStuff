    <link rel="stylesheet" href="../styles/style.css"/>

    <style>
        body{
            text-align: center;
            min-height: 100dvh;
        }
        form{
            display: flex; 
            flex-direction: column;
            width: 50%;
            margin: 0 auto;
            gap: 1rem 0;
            margin-top: 4rem;
        }

        form div > *:not(label), button{
            padding: 0.5rem;
            border-radius: 10px;
            margin-top: 10px;
        }

        label{
            font-weight: bold;
            text-align: center;
        }

        button{
            border: none;
            color: #a81c1c;
            font-weight: bold;
            font-size: 1rem;
            padding: 0.5rem;
        }
        input{
            border: none;
        }
        input:focus, textarea:focus, button:focus, button:hover{
            outline: none;
            border: none;
            box-shadow: 0 0 10px 3px #d63535;
            transform: scale(1.05);
        }

        input,textarea, button{
            background-color: #ffe6e6;
            color: #a81c1c;
            transition: all 0.2s ease;
        }

        textarea{
            resize: none;
            height: 5rem;
            border: none;
        }

        .inputContainer:not(:first-child){
            width: 100%;
            margin-top: 1rem;
        }

        .inputContainer > *:not(label){
            margin-top: 0.5rem;
        }

        .inputContainer > *, button{
            width: 80%;
            margin: 0 auto;
            display: block;
        }
    </style>
</head>

    <h1>Contact Us</h1>

    <form  id="contactForm">
        <div class="inputContainer">
            <label for="nameInput">Name: *</label>
            <input type="text" id="nameInput" name="name" placeholder="First and Last" required>
        </div>

        <div class="inputContainer">
            <label for="emailInput">Email: *</label>
            <input type="email" id="emailInput" name="email" placeholder="example@example.com" required>
        </div>

        <div class="inputContainer">
            <label for="phoneInput">Phone Number: *</label>
            <input type="tel" id="phoneInput" name="phone" placeholder="(123) 456-7890" required>
        </div>

        <div class="inputContainer">
            <label for="messageInput">Leave Us a Message: *</label>
            <textarea id="messageInput" name="message" placeholder="Enter text here..." required></textarea>
        </div>

        <button onclick="alert('Thank you for contacting us! \nWe will get back with you soon.')">Submit</button>
    </form>
